<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday 🎉</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    background:#0b0b12;
    overflow:hidden;
}

/* ================= SCREEN 1 ================= */

#screen1{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* REALISTIC GIFT */
.gift{
    width:200px;
    height:200px;
    position:relative;
    cursor:pointer;
    animation:floatGift 3s ease-in-out infinite;
}

.gift-box{
    width:100%;
    height:100%;
    background:linear-gradient(145deg,#ff4d6d,#c9184a);
    border-radius:15px;
    box-shadow:
        inset -10px -10px 20px rgba(0,0,0,0.4),
        inset 10px 10px 20px rgba(255,255,255,0.2),
        0 25px 50px rgba(0,0,0,0.6);
    position:relative;
}

.gift-lid{
    position:absolute;
    width:100%;
    height:60px;
    top:-50px;
    background:linear-gradient(145deg,#ff6b81,#ff4d6d);
    border-radius:10px;
}

.ribbon-v{
    position:absolute;
    width:25px;
    height:100%;
    background:#ffd166;
    left:50%;
    transform:translateX(-50%);
}

.ribbon-h{
    position:absolute;
    width:100%;
    height:25px;
    background:#ffd166;
    top:40%;
}

.gift-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:26px;
    color:white;
    font-weight:bold;
}

@keyframes floatGift{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
}

/* ================= SCREEN 2 ================= */

#screen2{
    display:none;
    min-height:100vh;
    background:radial-gradient(circle,#2b0035,#000);
    color:white;
    text-align:center;
    padding-bottom:80px;
    position:relative;
}

/* TITLE */
.title{
    font-size:28px;
    padding:15px;
    color:#ffd166;
}

/* FRAME */
.frame{
    width:90%;
    max-width:500px;
    margin:10px auto;
    padding:15px;
    border:8px solid gold;
    border-radius:20px;
    background:#3a0a3a;
    box-shadow:0 0 25px gold;
}

.frame h2{
    font-size:20px;
}

.frame p{
    font-size:14px;
}

/* CENTER IMAGE */
.center-img{
    margin-top:10px;
    width:70%;
    aspect-ratio:3/4;
    object-fit:cover;
    border-radius:15px;
    border:3px solid white;
    box-shadow:0 0 25px #ff4d6d;
}

/* CAKE */
.cake{
    margin:20px auto;
    width:130px;
    height:70px;
    background:#ffc2d1;
    border-radius:12px;
    position:relative;
    animation:cakeFloat 3s infinite ease-in-out;
}

@keyframes cakeFloat{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* CANDLES */
.candle{
    width:8px;
    height:25px;
    background:white;
    position:absolute;
    top:-25px;
}

.candle:nth-child(1){ left:25px;}
.candle:nth-child(2){ left:60px;}
.candle:nth-child(3){ left:95px;}

.candle::after{
    content:"";
    width:8px;
    height:12px;
    background:orange;
    position:absolute;
    top:-12px;
    left:50%;
    transform:translateX(-50%);
    border-radius:50%;
    animation:flame 0.2s infinite alternate;
}

@keyframes flame{
    from{transform:translateX(-50%) scale(1);}
    to{transform:translateX(-50%) scale(1.4);}
}

/* BALLOONS */
.balloon{
    position:absolute;
    width:30px;
    height:45px;
    border-radius:50%;
    animation:rise linear infinite;
    z-index:0;
}

.balloon::after{
    content:"";
    width:2px;
    height:30px;
    background:white;
    position:absolute;
    top:45px;
    left:50%;
}

@keyframes rise{
    0%{
        transform: translateY(100vh);
    }
    100%{
        transform: translateY(-120vh);
    }
}
/* MOBILE */
@media(max-width:600px){
    .gift{
        width:150px;
        height:150px;
    }

    .center-img{
        width:85%;
    }
}
</style>
</head>

<body>

<audio id="music" src="song.mp3" loop></audio>

<!-- SCREEN 1 -->
<div id="screen1">
    <div class="gift" onclick="openGift()">
        <div class="gift-lid"></div>
        <div class="gift-box">
            <div class="ribbon-v"></div>
            <div class="ribbon-h"></div>
            <div class="gift-text">Gift</div>
        </div>
    </div>
</div>

<!-- SCREEN 2 -->
<div id="screen2">

<div class="title">Happy Birthday 🎉</div>

<div class="frame">
    <h2>Happy Birthday Dear Madam 🎂</h2>
    <p>Wishing you joy, love & happiness 💖
         Many many happy returns of day
    </p>
    <img src="image4.jpg" class="center-img">
</div>

<div class="cake">
    <div class="candle"></div>
    <div class="candle"></div>
    <div class="candle"></div>
</div>

</div>

<script>
let balloonInterval;

function startBalloons(){
    balloonInterval = setInterval(()=>{
        let b=document.createElement("div");
        b.className="balloon";
        b.style.left=Math.random()*100+"%";
        b.style.background=`hsl(${Math.random()*360},70%,60%)`;
        b.style.animationDuration=(6+Math.random()*1)+"s";

        document.getElementById("screen2").appendChild(b);

        setTimeout(()=>{b.remove();},8000);
    },400);
}

function openGift(){
    document.getElementById("screen1").style.display="none";
    document.getElementById("screen2").style.display="block";

    document.getElementById("music").play().catch(()=>{});

    startBalloons();
}

/* Mobile audio fix */
document.body.addEventListener("click",()=>{
    document.getElementById("music").play();
},{once:true});
</script>

</body>
</html>
